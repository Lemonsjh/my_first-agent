<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 - 扫地机器人智能客服</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='chat.css') }}" />
  </head>
  <body>
    <div class="bg-layer bg-aurora"></div>
    <div class="bg-layer bg-grain" aria-hidden="true"></div>

    <main class="login-shell">
      <section class="login-card">
        <p class="eyebrow">SMART CLEAN SUPPORT</p>
        <h1>注册账号</h1>

        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        <form class="login-form" action="/register" method="post">
          <label>
            用户名
            <input type="text" name="username" required autocomplete="username" />
          </label>
          <label>
            密码
            <input type="password" name="password" required autocomplete="new-password" />
          </label>
          <label>
            确认密码
            <input type="password" name="confirm_password" required autocomplete="new-password" />
          </label>
          <button type="submit">注册</button>
        </form>
        <p class="hint">已有账号？<a href="/login">去登录</a></p>
      </section>
    </main>
  </body>
</html>
